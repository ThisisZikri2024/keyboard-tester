<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIY Keyboard Master V.1.4 - Multi-Language Fixed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Creepster&family=Kosugi+Maru&family=JetBrains+Mono&family=Noto+Sans+JP&family=Noto+Sans+Thai&family=Noto+Sans+Lao&family=Noto+Sans+Myanmar&display=swap');

        :root {
            --bg-body: #ffeff6;
            --bg-card: rgba(255, 255, 255, 0.95);
            --primary: #ff85a1;
            --secondary: #cdb4db;
            --accent: #fdf0d5;
            --text: #5e548e;
            --border: #ff85a1;
            --font-head: 'Fredoka One', cursive;
            --pattern: radial-gradient(#cdb4db 10%, transparent 11%);
        }

        [data-theme="horror"] {
            --bg-body: #1a0000;
            --bg-card: rgba(20, 0, 0, 0.9);
            --primary: #800000;
            --secondary: #4d0000;
            --accent: #260000;
            --text: #ff4d4d;
            --border: #ff0000;
            --font-head: 'Creepster', cursive;
            --pattern: radial-gradient(#4d0000 15%, transparent 16%);
        }

        body {
            background-color: var(--bg-body);
            background-image: var(--pattern);
            background-size: 25px 25px;
            color: var(--text);
            font-family: 'Kosugi Maru', 'Noto Sans Thai', 'Noto Sans Lao', 'Noto Sans Myanmar', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            transition: all 0.5s ease;
        }

        .container { width: 100%; max-width: 600px; padding: 20px; }

        .card {
            background: var(--bg-card);
            padding: 2rem;
            border-radius: 35px;
            border: 6px solid var(--border);
            box-shadow: 12px 12px 0px rgba(0, 0, 0, 0.15);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .user-tag {
            background: var(--secondary);
            color: white;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.9rem;
            display: inline-block;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .lang-selector-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }

        .lang-card-btn {
            background: white;
            border: 3px solid var(--secondary);
            padding: 10px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .lang-card-btn:hover { background: var(--accent); border-color: var(--primary); }

        .info-box {
            background: var(--accent);
            border: 2px solid var(--secondary);
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            text-align: left;
            font-size: 0.8rem;
        }

        .btn-main {
            background: var(--primary);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 18px;
            font-family: var(--font-head);
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 4px 0px var(--secondary);
            width: 100%;
            margin-top: 10px;
        }

        .btn-main:active { transform: translateY(2px); box-shadow: none; }

        textarea {
            width: 100%; height: 150px; padding: 15px; border-radius: 20px;
            border: 4px solid var(--secondary); font-family: 'JetBrains Mono', monospace;
            box-sizing: border-box; outline: none; resize: none; font-size: 1rem;
        }

        .progress-container { width: 100%; height: 8px; background: #eee; border-radius: 10px; margin-bottom: 15px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--primary); width: 100%; transition: 1s linear; }

        .hidden { display: none; }
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    </style>
</head>
<body data-theme="kawaii">

<div class="container">
    
    <div id="screen-lang" class="card">
        <h2 style="font-family: var(--font-head);">Select Language</h2>
        <div class="lang-selector-grid">
            <button class="lang-card-btn" onclick="selectLang('ms')"><span>🇲🇾</span>Melayu</button>
            <button class="lang-card-btn" onclick="selectLang('en')"><span>🇬🇧</span>English (UK)</button>
            <button class="lang-card-btn" onclick="selectLang('en_au')"><span>🇦🇺</span>English (AU)</button>
            <button class="lang-card-btn" onclick="selectLang('id')"><span>🇮🇩</span>Indonesia</button>
            <button class="lang-card-btn" onclick="selectLang('cn')"><span>🇨🇳</span>中文</button>
            <button class="lang-card-btn" onclick="selectLang('in')"><span>🇮🇳</span>हिन्दी</button>
            <button class="lang-card-btn" onclick="selectLang('de')"><span>🇩🇪</span>Deutsch</button>
            <button class="lang-card-btn" onclick="selectLang('ph')"><span>🇵🇭</span>Filipino</button>
            <button class="lang-card-btn" onclick="selectLang('th')"><span>🇹🇭</span>ไทย</button>
            <button class="lang-card-btn" onclick="selectLang('la')"><span>🇱🇦</span>ລາວ</button>
            <button class="lang-card-btn" onclick="selectLang('mm')"><span>🇲🇲</span>မြန်မာ</button>
            <button class="lang-card-btn" onclick="selectLang('jp')"><span>🇯🇵</span>日本語</button>
        </div>
    </div>

    <div id="screen-login" class="card hidden">
        <h2 data-tag="title_login"></h2>
        <div class="info-box">
            <div><i class="fa-solid fa-lightbulb"></i> <strong>Tips:</strong> <span data-tag="tips_text"></span></div>
            <hr style="opacity: 0.2; margin: 10px 0;">
            <div><i class="fa-solid fa-triangle-exclamation"></i> <span data-tag="warning_text"></span></div>
        </div>
        <input type="text" id="in-name" style="width:100%; padding:12px; border-radius:15px; border:3px solid var(--secondary); margin-bottom:15px; box-sizing: border-box;" data-placeholder="ph_name">
        <button class="btn-main" onclick="goMenu()"><span data-tag="btn_go"></span></button>
    </div>

    <div id="screen-menu" class="card hidden">
        <div class="user-tag"><i class="fa-solid fa-user"></i> <span class="display-username"></span></div>
        <h2 data-tag="title_menu"></h2>
        <div class="menu-grid">
            <button class="btn-main" onclick="start(15)">15s</button>
            <button class="btn-main" onclick="start(30)">30s</button>
            <button class="btn-main" onclick="start(60)">1m</button>
            <button class="btn-main" onclick="start(120)">2m</button>
            <button class="btn-main" onclick="start(180)">3m</button>
            <button class="btn-main" onclick="start(240)">4m</button>
        </div>
    </div>

    <div id="screen-test" class="card hidden">
        <div class="user-tag"><span class="display-username"></span></div>
        <div style="display:flex; justify-content: space-around; font-weight: bold; margin-bottom: 10px;">
            <span>S: <span id="timer">0</span></span>
            <span>WPM: <span id="wpm">0</span></span>
        </div>
        <div class="progress-container"><div id="p-bar" class="progress-bar"></div></div>
        <textarea id="typing-box" spellcheck="false" data-placeholder="ph_type"></textarea>
    </div>

    <div id="screen-result" class="card hidden">
        <h2 data-tag="title_result"></h2>
        <div class="user-tag">Player: <span class="display-username"></span></div>
        <div id="final-stats" style="font-weight: bold; font-size: 2rem; margin: 20px 0;"></div>
        <button class="btn-main" onclick="location.reload()"><span data-tag="btn_retry"></span></button>
    </div>

</div>

<script>
    const langData = {
        ms: { title_login: "Sistem Login", tips_text: "Beli keyboard di kedai terdekat untuk lebih laju!", warning_text: "Jangan beli OEM murah, tak tahan main game!", ph_name: "Nama anda...", btn_go: "Lanjut ✨", title_menu: "Pilih Masa", ph_type: "Mula menaip...", title_result: "Tamat!", btn_retry: "Semula" },
        en: { title_login: "Login System", tips_text: "Buy a keyboard at a local store for speed!", warning_text: "Avoid cheap OEM, bad for gaming!", ph_name: "Your name...", btn_go: "Next ✨", title_menu: "Select Time", ph_type: "Type here...", title_result: "Finished!", btn_retry: "Retry" },
        en_au: { title_login: "G'day Mate!", tips_text: "Grab a proper keyboard from the shop to type faster!", warning_text: "Don't buy cheap OEM junk, it won't last gaming!", ph_name: "Your name...", btn_go: "Go ✨", title_menu: "Pick a Time", ph_type: "Start typing...", title_result: "Done!", btn_retry: "Again" },
        id: { title_login: "Sistem Login", tips_text: "Beli keyboard di toko terdekat biar lebih cepat!", warning_text: "Jangan beli OEM murah, gak awet buat game!", ph_name: "Nama kamu...", btn_go: "Lanjut ✨", title_menu: "Pilih Waktu", ph_type: "Ketik di sini...", title_result: "Selesai!", btn_retry: "Kembali" },
        cn: { title_login: "登录系统", tips_text: "想要更快？去店里买个好键盘！", warning_text: "别买廉价OEM键盘，玩游戏不耐用！", ph_name: "名字...", btn_go: "进入 ✨", title_menu: "选择时间", ph_type: "在此输入...", title_result: "完成！", btn_retry: "重试" },
        in: { title_login: "लॉगिन", tips_text: "तेज़ टाइपिंग के लिए पास की दुकान से कीबोर्ड खरीदें!", warning_text: "सस्ते OEM कीबोर्ड न खरीदें, गेमिंग के लिए खराब!", ph_name: "आपका नाम...", btn_go: "आगे ✨", title_menu: "समय चुनें", ph_type: "यहाँ लिखें...", title_result: "समाप्त!", btn_retry: "फिर से" },
        de: { title_login: "Anmeldung", tips_text: "Kauf eine Tastatur im Laden, um schneller zu tippen!", warning_text: "Kein billiges OEM kaufen, schlecht für Gaming!", ph_name: "Dein Name...", btn_go: "Weiter ✨", title_menu: "Zeit wählen", ph_type: "Hier tippen...", title_result: "Fertig!", btn_retry: "Nochmal" },
        ph: { title_login: "Login", tips_text: "Bumili ng keyboard sa malapit para bumilis!", warning_text: "Iwasan ang murang OEM, hindi ito pang-gaming!", ph_name: "Pangalan...", btn_go: "Simulan ✨", title_menu: "Pumili ng Oras", ph_type: "Mag-type dito...", title_result: "Tapos!", btn_retry: "Ulitin" },
        th: { title_login: "เข้าสู่ระบบ", tips_text: "อยากพิมพ์เร็ว? ซื้อคีย์บอร์ดที่ร้านใกล้บ้าน!", warning_text: "อย่าซื้อ OEM ราคาถูก ไม่ทนสำหรับเล่นเกม!", ph_name: "ชื่อของคุณ...", btn_go: "ถัดไป ✨", title_menu: "เลือกเวลา", ph_type: "พิมพ์ที่นี่...", title_result: "เสร็จสิ้น!", btn_retry: "ลองใหม่" },
        la: { title_login: "ເຂົ້າສູ່ລະບົບ", tips_text: "ຢາກພິມໄວ? ຊື້ຄີບອດຢູ່ຮ້ານໃກ້ບ້ານ!", warning_text: "ຢ່າຊື້ OEM ລາຄາຖືກ, ບໍ່ທົນທານສໍາລັບການຫຼິ້ນເກມ!", ph_name: "ຊື່ຂອງທ່ານ...", btn_go: "ເລີ່ມ ✨", title_menu: "ເລືອກເວລາ", ph_type: "ພິມຢູ່ນີ້...", title_result: "ສຳເລັດ!", btn_retry: "ລອງໃໝ່" },
        mm: { title_login: "အကောင့်ဝင်ပါ", tips_text: "မြန်မြန်ရိုက်ချင်ရင် ဆိုင်မှာကီးဘုတ်အကောင်းစားဝယ်ပါ။", warning_text: "ဈေးပေါတဲ့ OEM တွေကိုရှောင်ပါ၊ ဂိမ်းဆော့ရင်မခံပါဘူး။", ph_name: "နာမည်...", btn_go: "ရှေ့သို့ ✨", title_menu: "အချိန်ရွေးပါ", ph_type: "ဒီမှာရိုက်ပါ...", title_result: "ပြီးပါပြီ!", btn_retry: "ပြန်လုပ်ပါ" },
        jp: { title_login: "ログイン", tips_text: "速く打ちたい？店でキーボードを買おう！", warning_text: "安いOEMは避けて。ゲームには向きません！", ph_name: "お名前...", btn_go: "次へ ✨", title_menu: "時間選択", ph_type: "入力...", title_result: "終了！", btn_retry: "戻る" }
    };

    let curLang = 'ms', timer, timeLeft, totalTime, active = false, userName = "";
    const clickSound = new Audio('https://www.soundjay.com/buttons/sounds/button-16.mp3');

    function selectLang(l) {
        curLang = l;
        updateUI();
        document.getElementById('screen-lang').classList.add('hidden');
        document.getElementById('screen-login').classList.remove('hidden');
    }

    function updateUI() {
        const data = langData[curLang] || langData['en'];
        document.querySelectorAll('[data-tag]').forEach(el => el.innerText = data[el.getAttribute('data-tag')] || "");
        document.querySelectorAll('[data-placeholder]').forEach(el => el.placeholder = data[el.getAttribute('data-placeholder')] || "");
    }

    function goMenu() {
        userName = document.getElementById('in-name').value.trim();
        if(userName) {
            document.querySelectorAll('.display-username').forEach(el => el.innerText = userName);
            document.getElementById('screen-login').classList.add('hidden');
            document.getElementById('screen-menu').classList.remove('hidden');
        }
    }

    function start(s) {
        timeLeft = s; totalTime = s; active = false;
        document.getElementById('screen-menu').classList.add('hidden');
        document.getElementById('screen-test').classList.remove('hidden');
        document.getElementById('timer').innerText = s;
        document.getElementById('p-bar').style.width = "100%";
        const box = document.getElementById('typing-box');
        box.value = ""; box.focus();
        box.oninput = () => {
            if(!active) { active = true; startClock(); }
            clickSound.currentTime = 0; clickSound.play();
            calc();
        };
    }

    function startClock() {
        timer = setInterval(() => {
            if(timeLeft > 0) {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                document.getElementById('p-bar').style.width = (timeLeft / totalTime * 100) + "%";
            } else { end(); }
        }, 1000);
    }

    function calc() {
        const val = document.getElementById('typing-box').value.trim();
        const words = val ? val.split(/\s+/).length : 0;
        const passed = totalTime - timeLeft;
        if(passed > 0) {
            document.getElementById('wpm').innerText = Math.round((words / passed) * 60);
        }
    }

    function end() {
        clearInterval(timer);
        const wpm = document.getElementById('wpm').innerText;
        document.getElementById('final-stats').innerText = wpm + " WPM";
        document.getElementById('screen-test').classList.add('hidden');
        document.getElementById('screen-result').classList.remove('hidden');
    }
</script>
</body>
</html>
