<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIY Keyboard Master V.1.2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Creepster&family=Kosugi+Maru&display=swap');

        /* TEMA ASAS & KAWAII */
        :root {
            --bg-body: #ffeff6;
            --bg-card: rgba(255, 255, 255, 0.95);
            --primary: #ff85a1;
            --secondary: #cdb4db;
            --accent: #fdf0d5;
            --text: #5e548e;
            --border: #ff85a1;
            --font-head: 'Fredoka One', cursive;
            --pattern: radial-gradient(#cdb4db 10%, transparent 11%);
        }

        /* TEMA SERAM (HORROR) */
        [data-theme="horror"] {
            --bg-body: #1a0000;
            --bg-card: rgba(20, 0, 0, 0.9);
            --primary: #800000;
            --secondary: #4d0000;
            --accent: #260000;
            --text: #ff4d4d;
            --border: #ff0000;
            --font-head: 'Creepster', cursive;
            --pattern: radial-gradient(#4d0000 15%, transparent 16%);
        }

        body {
            background-color: var(--bg-body);
            background-image: var(--pattern);
            background-size: 25px 25px;
            color: var(--text);
            font-family: 'Kosugi Maru', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            transition: all 0.5s ease;
        }

        .container { width: 100%; max-width: 500px; padding: 20px; }

        .card {
            background: var(--bg-card);
            padding: 2.5rem;
            border-radius: 35px;
            border: 6px solid var(--border);
            box-shadow: 12px 12px 0px rgba(0, 0, 0, 0.2);
            text-align: center;
            position: relative;
        }

        .version-badge {
            position: absolute;
            top: 15px;
            right: 20px;
            background: var(--primary);
            color: white;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-family: sans-serif;
        }

        /* Theme & Lang Switcher */
        .settings-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 10px;
        }

        .lang-btn, .theme-btn {
            background: white;
            border: 3px solid var(--secondary);
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            color: #333;
        }

        .lang-btn.active { background: var(--primary); border-color: var(--border); color: white; }
        
        .theme-btn-horror { background: #000; color: #ff0000; border-color: #ff0000; }
        .theme-btn-kawaii { background: #ffeff6; color: #ff85a1; border-color: #ff85a1; }

        h2 { font-family: var(--font-head); font-size: 2rem; margin-top: 0; }

        .desc-box {
            background: var(--accent);
            padding: 15px;
            border-radius: 20px;
            margin: 20px 0;
            font-size: 0.85rem;
            border: 3px dashed var(--border);
            text-align: left;
        }

        input, textarea {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: 4px solid var(--secondary);
            background: white;
            color: #333;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }

        [data-theme="horror"] input, [data-theme="horror"] textarea {
            background: #111;
            color: #ff4d4d;
        }

        textarea { height: 140px; resize: none; margin-top: 15px; }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 15px;
        }

        button.btn-main {
            background: var(--primary);
            border: 4px solid white;
            color: white;
            padding: 12px;
            border-radius: 20px;
            font-family: var(--font-head);
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 5px 0px var(--secondary);
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button.btn-main:active { transform: translateY(3px); box-shadow: 0 0px 0px var(--secondary); }

        .stats {
            display: flex;
            justify-content: space-between;
            background: var(--secondary);
            color: white;
            padding: 12px 20px;
            border-radius: 20px;
            margin-bottom: 15px;
            border: 4px solid white;
        }

        .highscore-container {
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 18px;
            margin: 20px 0;
            text-align: left;
            border: 3px solid var(--secondary);
        }

        .hidden { display: none; }
    </style>
</head>
<body data-theme="kawaii">

<div class="container">
    <div class="settings-bar">
        <div class="lang-group">
            <button id="ms" class="lang-btn active" onclick="changeLang('ms')">MY</button>
            <button id="en" class="lang-btn" onclick="changeLang('en')">EN</button>
            <button id="jp" class="lang-btn" onclick="changeLang('jp')">JP</button>
        </div>
        <div class="theme-group">
            <button class="theme-btn theme-btn-kawaii" onclick="setTheme('kawaii')">🌸</button>
            <button class="theme-btn theme-btn-horror" onclick="setTheme('horror')">🩸</button>
        </div>
    </div>

    <div id="screen-login" class="card">
        <div class="version-badge">V.1.2 Build</div>
        <h2 data-tag="title_login">Login</h2>
        <div class="desc-box">
            <i id="theme-icon" class="fa-solid fa-heart"></i> <span data-tag="desc_login"></span>
        </div>
        <input type="text" id="in-name" data-placeholder="ph_name">
        <button class="btn-main" onclick="goMenu()" style="width:100%; margin-top:15px;">
            <i class="fa-solid fa-bolt"></i> <span data-tag="btn_go">Mula</span>
        </button>
    </div>

    <div id="screen-menu" class="card hidden">
        <h2 data-tag="title_menu">Masa</h2>
        <div class="menu-grid">
            <button class="btn-main" onclick="start(15)">15s</button>
            <button class="btn-main" onclick="start(30)">30s</button>
            <button class="btn-main" onclick="start(45)">45s</button>
            <button class="btn-main" onclick="start(60)">60s</button>
            <button class="btn-main" onclick="start(180)" style="grid-column: span 2;">3m</button>
        </div>
    </div>

    <div id="screen-test" class="card hidden">
        <div class="stats">
            <span><i class="fa-solid fa-stopwatch"></i> <span id="timer">0</span>s</span>
            <span>WPM: <span id="wpm">0</span></span>
        </div>
        <textarea id="typing-box" data-placeholder="ph_type"></textarea>
    </div>

    <div id="screen-result" class="card hidden">
        <h2 data-tag="title_result">Tamat</h2>
        <div id="final-wpm" style="font-size: 3.5rem; margin: 10px 0;">0</div>
        <div class="highscore-container" id="hs-box"></div>
        <button class="btn-main" onclick="location.reload()" style="width:100%">
            <span data-tag="btn_retry">Semula</span>
        </button>
    </div>
</div>

<script>
    const langData = {
        ms: {
            title_login: "Sistem Login",
            desc_login: "Uji kepantasan menaip manual anda. Pilih tema comel atau seram di atas!",
            ph_name: "Nama anda...", btn_go: "Mula Cabaran ✨",
            title_menu: "Pilih Masa 🕒", ph_type: "Taip manual di sini secepat mungkin...",
            title_result: "Keputusan 🎉", btn_retry: "Kembali"
        },
        en: {
            title_login: "Login System",
            desc_login: "Test your manual typing speed. Choose kawaii or horror theme above!",
            ph_name: "Your name...", btn_go: "Start Challenge ✨",
            title_menu: "Select Time 🕒", ph_type: "Type manually here as fast as you can...",
            title_result: "Results 🎉", btn_retry: "Go Back"
        },
        jp: {
            title_login: "ログイン",
            desc_login: "タイピング速度を測定します。可愛いテーマか怖いテーマを選んでね！",
            ph_name: "お名前...", btn_go: "スタート ✨",
            title_menu: "時間選択 🕒", ph_type: "ここに手動で入力を開始してください...",
            title_result: "測定結果 🎉", btn_retry: "戻る"
        }
    };

    let curLang = 'ms', timer, timeLeft, totalTime, active = false;

    function setTheme(t) {
        document.body.setAttribute('data-theme', t);
        const icon = document.getElementById('theme-icon');
        icon.className = t === 'kawaii' ? 'fa-solid fa-heart' : 'fa-solid fa-skull-crossbones';
        localStorage.setItem('v12_theme', t);
    }

    function changeLang(l) {
        curLang = l;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(l).classList.add('active');
        updateUI();
    }

    function updateUI() {
        document.querySelectorAll('[data-tag]').forEach(el => {
            el.innerText = langData[curLang][el.getAttribute('data-tag')];
        });
        document.querySelectorAll('[data-placeholder]').forEach(el => {
            el.placeholder = langData[curLang][el.getAttribute('data-placeholder')];
        });
    }

    function goMenu() {
        const n = document.getElementById('in-name').value;
        if(n.trim()) {
            localStorage.setItem('user_v12', n);
            document.getElementById('screen-login').classList.add('hidden');
            document.getElementById('screen-menu').classList.remove('hidden');
        }
    }

    function start(s) {
        timeLeft = s; totalTime = s; active = false;
        document.getElementById('screen-menu').classList.add('hidden');
        document.getElementById('screen-test').classList.remove('hidden');
        document.getElementById('timer').innerText = s;
        const box = document.getElementById('typing-box');
        box.value = ""; box.focus();
        box.oninput = () => { if(!active) { active = true; startClock(); } calc(); };
    }

    function startClock() {
        timer = setInterval(() => {
            if(timeLeft > 0) { timeLeft--; document.getElementById('timer').innerText = timeLeft; }
            else { end(); }
        }, 1000);
    }

    function calc() {
        const val = document.getElementById('typing-box').value.trim();
        const words = val ? val.split(/\s+/).length : 0;
        const passed = totalTime - timeLeft;
        if(passed > 0) document.getElementById('wpm').innerText = Math.round((words / passed) * 60);
    }

    function end() {
        clearInterval(timer);
        const wpm = document.getElementById('wpm').innerText;
        save(wpm); showHS();
        document.getElementById('final-wpm').innerText = wpm + " WPM";
        document.getElementById('screen-test').classList.add('hidden');
        document.getElementById('screen-result').classList.remove('hidden');
    }

    function save(w) {
        const user = localStorage.getItem('user_v12');
        const key = `v12_hs_${totalTime}`;
        if(parseInt(w) > (localStorage.getItem(key) || 0)) {
            localStorage.setItem(key, w);
            localStorage.setItem(key+'_u', user);
        }
    }

    function showHS() {
        const ts = [15, 30, 45, 60, 180];
        let h = `<h4 style="margin:0 0 10px 0;">Record Highscores</h4>`;
        ts.forEach(t => {
            const s = localStorage.getItem(`v12_hs_${t}`) || 0;
            const u = localStorage.getItem(`v12_hs_${t}_u`) || "-";
            h += `<div style="display:flex; justify-content:space-between; font-size:0.8rem; border-bottom:1px solid rgba(255,255,255,0.1); padding:5px 0;">
                  <span>${t}s</span><span><b>${s} WPM</b> (${u})</span></div>`;
        });
        document.getElementById('hs-box').innerHTML = h;
    }

    window.onload = () => {
        setTheme(localStorage.getItem('v12_theme') || 'kawaii');
        updateUI();
    };
</script>
</body>
</html>
